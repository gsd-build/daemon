name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: "1.26"
          cache-dependency-path: go.sum

      - name: Download modules
        run: go mod download

      - name: Run unit + integration tests
        run: go test -v -race -timeout 5m ./...

  pi-extension:
    name: Pi extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: internal/pi/extension/package-lock.json

      - name: Install Pi extension dependencies
        working-directory: internal/pi/extension
        run: npm ci

      - name: Test Pi extension
        working-directory: internal/pi/extension
        run: npm test
